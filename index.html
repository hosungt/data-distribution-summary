<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>자료의 분포와 요약</title>
  <style>
    :root {
      --bg:#0b1020; --panel:#ffffff; --ink:#111827; --grid:#e5e7eb;
      --axis:#111827; --accent:#2563eb; --good:#16a34a; --bad:#ef4444;
      --warn:#f59e0b; --line:#1d4ed8; --muted:#6b7280;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: #f3f4f6;
      font-family: "Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",ui-sans-serif,system-ui,-apple-system,sans-serif;
    }
    .header { max-width: 1100px; margin: 20px auto 10px; padding: 0 16px; }
    .title { font-weight: 800; font-size: clamp(20px, 3.2vw, 36px); letter-spacing: .5px; }
    .subtitle { margin-top: 4px; color: #cbd5e1; font-size: 14px; }
    .test-banner {
      display: inline-block; margin-top: 10px; padding: 6px 12px;
      border-radius: 999px; background: rgba(245,158,11,.18);
      border: 1px solid rgba(253,186,116,.45); color: #fde68a;
      font-size: 12px; font-weight: 700;
    }

    .wrap {
      max-width: 1100px; margin: 8px auto 28px; padding: 0 16px;
      display: grid; grid-template-columns: 1fr minmax(260px, 360px);
      gap: 16px; align-items: start;
    }
    .card, .panel {
      background: var(--panel); color: var(--ink);
      border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.25);
      padding: 14px;
    }
    .panel h3 { margin: 2px 0 10px; font-size: 16px; font-weight: 800; }
    .panel h3.with-divider { border-top: 1px solid #e5e7eb; padding-top: 14px; margin-top: 14px; }

    .canvas-wrap {
      width: 100%; height: 260px; position: relative;
      background: #fff; border: 2px solid #d1d5db; border-radius: 10px;
    }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; }

    /* SC info row under canvas */
    .class-info-row {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 4px; margin-top: 8px; font-size: 12px;
    }
    .class-info {
      text-align: center; padding: 6px 4px;
      border: 1px solid #e5e7eb; border-radius: 8px;
      background: #f9fafb; color: #6b7280;
    }
    .class-info.sc { background: #fef2f2; border-color: #fecaca; color: #991b1b; font-weight: 700; }
    .class-info .range { font-size: 11px; color: #9ca3af; margin-bottom: 2px; }
    .class-info.sc .range { color: #b91c1c; }
    .class-info .count { font-size: 13px; }
    .class-info.sc .count.match { color: #16a34a; }
    .class-info.sc .count.mismatch { color: #b91c1c; }

    /* Stats table */
    .stats-table {
      margin-top: 12px; width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .stats-table th, .stats-table td {
      border: 1px solid #e5e7eb; padding: 8px 6px; text-align: center;
    }
    .stats-table thead th { background: #f3f4f6; color: #374151; font-weight: 700; }
    .stats-table tbody th { background: #f9fafb; color: #6b7280; font-weight: 700; width: 60px; }
    .stats-table tbody td { color: var(--ink); font-variant-numeric: tabular-nums; }
    .stats-table tbody td.muted { color: #9ca3af; }

    /* Arrow row */
    .arrow-row {
      display: flex; gap: 8px; justify-content: center; margin-top: 12px;
    }
    .arrow-btn {
      background: #fff; color: var(--ink);
      border: 1.5px solid #d1d5db; border-radius: 12px;
      width: 64px; height: 48px; font-size: 24px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
    }
    .arrow-btn:active { background: #f3f4f6; }
    .arrow-btn:disabled { opacity: .35; cursor: not-allowed; }

    .hint-line {
      margin-top: 8px; font-size: 12px; color: var(--muted); text-align: center;
    }

    /* Right panel widgets */
    .stat-chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .chip {
      background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 999px;
      padding: 6px 10px; font-size: 13px; color: #374151;
    }
    .chip b { color: var(--ink); font-weight: 800; font-variant-numeric: tabular-nums; }
    .chip.warn { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.4); color: #92400e; }
    .chip.warn b { color: #92400e; }

    .score-box {
      background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 12px;
      padding: 12px; margin-bottom: 10px;
    }
    .score-box .label { font-size: 12px; color: var(--muted); }
    .score-box .total {
      font-size: 28px; font-weight: 800; color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .score-box .breakdown { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .controls { display: flex; flex-direction: column; gap: 8px; }
    .btn {
      border: 1px solid #d1d5db; background: #111827; color: #fff;
      padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 14px;
      font-weight: 700;
    }
    .btn.primary { background: var(--accent); border-color: var(--accent); }
    .btn.danger { background: var(--bad); border-color: var(--bad); }
    .btn.ghost { background: #fff; color: var(--ink); }
    .btn.ghost:hover { background: #f3f4f6; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .records-list { display: grid; gap: 6px; font-size: 13px; color: #374151; }
    .records-list .record-row {
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 8px; align-items: baseline;
    }
    .records-list .rank { color: var(--muted); font-weight: 700; }
    .records-list .meta { color: var(--muted); font-size: 11px; }
    .records-list .score { font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; }
    .records-empty { color: var(--muted); font-size: 13px; }

    .ranking-placeholder {
      padding: 14px; border: 1px dashed #d1d5db; border-radius: 10px;
      text-align: center; color: var(--muted); font-size: 13px;
    }

    /* Mode selector overlay */
    .mode-selector { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    .mode-section { margin-bottom: 24px; }
    .mode-section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin: 0 4px 10px; gap: 12px;
    }
    .mode-section-header h2 {
      margin: 0; font-size: 18px; font-weight: 800; color: #f3f4f6;
      letter-spacing: .3px;
    }
    .mode-section-hint { color: #94a3b8; font-size: 12px; }

    .level-grid {
      display: grid; gap: 10px;
      grid-template-columns: repeat(7, 1fr);
    }
    .level-card {
      background: var(--panel); color: var(--ink);
      border-radius: 14px; box-shadow: 0 6px 20px rgba(0,0,0,.22);
      padding: 14px 10px; cursor: pointer; border: 2px solid transparent;
      text-align: center;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      position: relative;
    }
    .level-card:hover:not(.locked) {
      border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,.28);
    }
    .level-card .level-num {
      font-size: 18px; font-weight: 800; color: var(--ink);
      margin-bottom: 4px;
    }
    .level-card .level-tag {
      font-size: 11px; color: var(--muted); line-height: 1.3;
      min-height: 28px;
    }
    .level-card.locked {
      cursor: not-allowed; opacity: 0.45; filter: grayscale(0.4);
    }
    .level-card.locked .lock-icon {
      position: absolute; top: 6px; right: 8px;
      font-size: 13px; color: var(--muted);
    }
    .level-card.passed::after {
      content: '✓';
      position: absolute; top: 6px; right: 8px;
      font-size: 13px; color: var(--good); font-weight: 800;
    }

    /* Unlock banner inside result card */
    .unlock-banner {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff; padding: 10px 14px; border-radius: 12px;
      font-weight: 700; font-size: 14px; margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(22,163,74,.3);
    }

    /* Result overlay */
    .result-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; z-index: 50;
    }
    .result-card {
      background: var(--panel); color: var(--ink);
      border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
      padding: 22px; max-width: 480px; width: 100%;
    }
    .result-card h2 { margin: 0 0 8px; font-size: 22px; font-weight: 800; }
    .result-card .total {
      font-size: 36px; font-weight: 800; color: var(--accent);
      margin: 6px 0 14px; font-variant-numeric: tabular-nums;
    }
    .breakdown-table {
      width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 14px;
    }
    .breakdown-table td { padding: 6px 4px; border-top: 1px solid #f3f4f6; }
    .breakdown-table td.label { color: var(--muted); width: 100px; }
    .breakdown-table td.value { color: var(--ink); }
    .breakdown-table td.points { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
    .result-card .actions { display: flex; gap: 8px; }
    .result-card .actions .btn { flex: 1; }

    /* Toasts */
    .toast-stack {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; z-index: 60;
    }
    .toast {
      background: rgba(17,24,39,.92); color: #fff;
      padding: 10px 14px; border-radius: 10px;
      font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,.3);
      animation: toastIn .18s ease-out;
    }
    .toast.warn { background: rgba(245,158,11,.95); }
    .toast.bad { background: rgba(239,68,68,.95); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-6px);} to {opacity:1; transform: translateY(0);} }

    @media (max-width: 840px) {
      .wrap { grid-template-columns: 1fr; }
      .level-grid { grid-template-columns: repeat(4, 1fr); }
      .canvas-wrap { height: 220px; }
    }
    @media (max-width: 540px) {
      .level-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 480px) {
      .stats-table { font-size: 11px; }
      .stats-table th, .stats-table td { padding: 6px 3px; }
      .class-info-row { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">자료의 분포와 요약</div>
    <div class="subtitle" id="modeSubtitle">통계 — 자료의 중심과 퍼짐 학습 게임</div>
    <span class="test-banner">테스트 모드 — 운영 점수 미적용</span>
  </div>

  <!-- Mode selector (shown when no ?contentMode= is present) -->
  <div class="mode-selector" id="modeSelectorView" style="display: none;">
    <div class="mode-section">
      <div class="mode-section-header">
        <h2>본 게임 (Level 1~7)</h2>
        <div class="mode-section-hint">100점 미만으로 통과하면 다음 Level이 활성화됩니다</div>
      </div>
      <div class="level-grid" id="mainLevelGrid"></div>
    </div>

    <div class="mode-section">
      <div class="mode-section-header">
        <h2>연습 모드</h2>
        <div class="mode-section-hint">활성화된 Level만 자유롭게 연습 (점수 기록 별도)</div>
      </div>
      <div class="level-grid" id="practiceLevelGrid"></div>
    </div>
  </div>

  <!-- Game view (shown when contentMode is set) -->
  <div class="wrap" id="gameView" style="display: none;">
    <div class="card" id="canvasCard">
      <div class="canvas-wrap">
        <canvas id="dotGraphCanvas" tabindex="0" aria-label="자료의 점 그래프"></canvas>
      </div>
      <div class="class-info-row" id="classInfoRow"></div>

      <table class="stats-table">
        <thead>
          <tr><th></th><th>평균</th><th>중앙값</th><th>최빈값</th><th>표준편차</th></tr>
        </thead>
        <tbody>
          <tr><th>현재</th>
            <td id="curMean" class="muted">—</td>
            <td id="curMedian" class="muted">—</td>
            <td id="curMode" class="muted">—</td>
            <td id="curStdev" class="muted">—</td>
          </tr>
          <tr><th>목표</th>
            <td id="goalMean" class="muted">—</td>
            <td id="goalMedian" class="muted">—</td>
            <td id="goalMode" class="muted">—</td>
            <td id="goalStdev" class="muted">—</td>
          </tr>
        </tbody>
      </table>

      <div class="arrow-row">
        <button class="arrow-btn" id="leftBtn" aria-label="왼쪽으로 한 칸" disabled>◀</button>
        <button class="arrow-btn" id="rightBtn" aria-label="오른쪽으로 한 칸" disabled>▶</button>
      </div>
      <div class="hint-line" id="hintLine">게임 시작 버튼을 눌러 자료를 생성하세요.</div>
    </div>

    <div class="panel">
      <div class="stat-chip-row" id="metaChips"></div>
      <div class="score-box">
        <div class="label">현재 점수 (낮을수록 좋아요)</div>
        <div class="total" id="scoreTotal">—</div>
        <div class="breakdown" id="scoreBreakdown">기본 — / 추가 —</div>
      </div>
      <div class="controls">
        <button class="btn primary" id="startBtn">게임 시작</button>
        <button class="btn" id="confirmBtn" style="display:none;" disabled>확정 (이동 1회 차감)</button>
        <button class="btn danger" id="endBtn" disabled>여기서 끝내기</button>
        <button class="btn ghost" id="cancelPreviewBtn" style="display:none;">미리보기 취소</button>
        <button class="btn ghost" id="modeSelectBtn">모드 선택으로</button>
      </div>

      <h3 class="with-divider">나의 기록 (상위 5)</h3>
      <div id="recordsBody" class="records-empty">아직 기록이 없습니다.</div>

      <h3 class="with-divider">전체 랭킹</h3>
      <div class="ranking-placeholder">준비 중 (Phase 2에서 활성화)</div>
    </div>
  </div>

  <!-- Result overlay -->
  <div class="result-overlay" id="resultOverlay" style="display: none;">
    <div class="result-card">
      <h2 id="resultTitle">결과</h2>
      <div id="unlockBanner" class="unlock-banner" style="display: none;"></div>
      <div class="total" id="resultTotal">—</div>
      <table class="breakdown-table" id="resultBreakdown"></table>
      <div class="actions" id="resultActions"></div>
    </div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
